<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeneInsight Lite</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
      background: #f7f9fc;
      color: #1f2937;
    }

    h1 {
      margin-bottom: 8px;
    }

    .subtitle {
      margin-bottom: 24px;
      color: #4b5563;
    }

    .search-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
    }

    button {
      padding: 12px 16px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    button:hover {
      background: #1d4ed8;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .paper {
      border-top: 1px solid #e5e7eb;
      padding-top: 12px;
      margin-top: 12px;
    }

    .muted {
      color: #6b7280;
    }

    .error {
      color: #b91c1c;
      font-weight: bold;
      margin-top: 12px;
    }

    .loading {
      color: #2563eb;
      margin-top: 12px;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>GeneInsight Lite</h1>
  <p class="subtitle">
    Enter a human gene symbol to generate a quick bioinformatics report.
  </p>

  <div class="search-row">
    <input id="geneInput" type="text" placeholder="Try TP53, BRCA1, EGFR..." />
    <button onclick="searchGene()">Generate Report</button>
  </div>

  <div id="status"></div>
  <div id="result"></div>

  <script>
    async function searchGene() {
      const input = document.getElementById("geneInput");
      const result = document.getElementById("result");
      const status = document.getElementById("status");


      const gene = input.value.trim();
      result.innerHTML = "";

      if (!gene) {
        status.innerHTML = '<div class="error">Please enter a gene symbol.</div>';
        return;
      }

      status.innerHTML = '<div class="loading">Loading report...</div>';

      try {
        const response = await fetch(`/api/gene/${encodeURIComponent(gene)}`);

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.detail || "Something went wrong.");
        }

        const data = await response.json();
        const geneData = data.gene;
        const papers = data.papers || [];
        const alphafold = data.alphafold;

        status.innerHTML = "";

        let alphafoldHtml = `
        <div class="card">
          <h3>AlphaFold Structure</h3>
          <p class="muted">No AlphaFold entry found for this gene.</p>
        </div>
        `;

        let html = `
          <div class="card">
            <h2>${geneData.symbol}</h2>
            <p><strong>Full name:</strong> ${geneData.name}</p>
            <p><strong>Entrez ID:</strong> ${geneData.entrezgene}</p>
            <p><strong>Summary:</strong> ${geneData.summary}</p>
          </div>

          ${alphafoldHtml}

          <div class="card">
            <h3>Recent Related Papers</h3>
        `;
        
        if (alphafold && alphafold.accession) {
          alphafoldHtml = `
          <div class="card">
            <h3>AlphaFold Structure</h3>
            <p><strong>UniProt accession:</strong> ${alphafold.accession}</p>
            <p>
              <a href="${alphafold.alphafold_entry_url}" target="_blank" rel="noopener noreferrer">
                Open AlphaFold structure
              </a>
            </p>
          </div>
          `;
        }

        if (papers.length === 0) {
          html += `<p class="muted">No papers found.</p>`;
        } else {
          papers.forEach((paper) => {
            html += `
              <div class="paper">
                <p><strong>${paper.url
                  ? `<a href="${paper.url}" target="_blank" rel="noopener noreferrer">${paper.title}</a>`
                  : paper.title}
                  </strong></p>
                <p class="muted">${paper.journal} • ${paper.year}</p>
                <p>${paper.abstract}</p>
              </div>
            `;
          });
        }

        html += `</div>`;
        result.innerHTML = html;

      } catch (error) {
        status.innerHTML = `<div class="error">${error.message}</div>`;
      }
    }
  </script>
</body>
</html>
